<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DramaForge - Drama Title Generator</title>

<meta name="description" content="Generate unique drama titles for romance, CEO, revenge, fantasy, and more story ideas.">

<meta name="keywords" content="drama title generator, romance title generator, CEO drama titles, manhwa titles, story ideas">

<style>

body {
    font-family: Arial, sans-serif;
    background: #f4f4f4;
    text-align: center;
    padding: 30px;
}

.container {
    max-width: 600px;
    margin: auto;
    background: white;
    padding: 30px;
    border-radius: 20px;
}

h1 {
    font-size: 40px;
}

p {
    font-size: 18px;
}

select, button {
    padding: 12px;
    margin: 10px;
    border-radius: 10px;
    font-size: 16px;
}

button {
    cursor: pointer;
}

#result {
    margin-top: 25px;
    font-size: 24px;
    font-weight: bold;
}

</style>

</head>


<body>


<div class="container">

<h1>DramaForge</h1>

<p>
Generate unique drama titles for romance, CEO, revenge, fantasy, and more.
</p>


<select id="category">

<option value="romance">Romance</option>
<option value="ceo">CEO</option>
<option value="revenge">Revenge</option>
<option value="fantasy">Fantasy</option>
<option value="family">Family</option>

</select>


<br>


<button onclick="generateTitle()">
Generate Title
</button>


<div id="result">
Your title will appear here
</div>


</div>



<script>


const titles = {

romance: [
"Falling In Love With My Secret Husband",
"The Love We Never Expected",
"Married To My Childhood Love",
"The Girl Who Stole His Heart"
],


ceo: [
"The CEO's Hidden Wife",
"The Billionaire's Forgotten Love",
"The Cold CEO Fell For Her",
"The Secret Heiress Of The Empire"
],


revenge: [
"She Returned To Take Everything Back",
"The Girl Who Came Back For Revenge",
"Her Second Life Begins With Revenge",
"The Betrayed Wife Strikes Back"
],


fantasy: [
"Reborn With A Powerful System",
"The Girl Who Awakened Magic",
"The Villainess Changes Her Destiny",
"The Forgotten Princess Returns"
],


family: [
"The Lost Daughter Of A Rich Family",
"The Adopted Girl Reveals Her Identity",
"The Family That Regretted Losing Her",
"The Hidden Heiress Comes Home"
]

};



function generateTitle(){

let category = document.getElementById("category").value;

let list = titles[category];

let random = Math.floor(Math.random() * list.length);


document.getElementById("result").innerHTML = list[random];

}


</script>


</body>
</html>
